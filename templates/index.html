<!DOCTYPE html>
<html>

<head>
    <title>AI Phishing Detection Chatbot</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="chat-container">

        <h1>🤖 AI Phishing Detection Chatbot</h1>

        <div class="chat-box">

            {% if result %}

            <div class="user-message">
                {{ request.form['url'] }}
            </div>

            <div class="bot-message" id="bot-response">
    🤖 Analyzing message...
</div>

<script>

    const botMessage = document.getElementById("bot-response");

    const finalText = `{{ result }}`;

    let index = 0;

    setTimeout(() => {

        botMessage.innerHTML = "";

        function typeEffect() {

            if(index < finalText.length){

                botMessage.innerHTML += finalText.charAt(index);

                index++;

                setTimeout(typeEffect, 25);
            }
        }

        typeEffect();

    }, 2000);

</script>
            {% endif %}

        </div>

        <form method="POST">

            <textarea
                name="url"
                placeholder="Paste suspicious message here..."
                required></textarea>

            <button type="submit">
                Send
            </button>

        </form>\
        <h2>📁 Detection History</h2>

<div class="history-box">

    {% for item in history %}

    <div class="history-item">

        <p><strong>Message:</strong></p>
        <p>{{ item.message }}</p>

        <p><strong>Result:</strong></p>
        <p>{{ item.result }}</p>

    </div>

    {% endfor %}

</div>

    </div>

</body>

</html>
